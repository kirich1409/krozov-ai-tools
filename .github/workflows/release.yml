name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/maven-mcp

    permissions:
      contents: write

    steps:
      # Full history so we can verify the tag commit is reachable from main
      # (shallow tag-only checkout would make merge-base checks meaningless).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is reachable from main
        working-directory: .
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points at ${GITHUB_SHA}, which is not an ancestor of origin/main. Refuse to release an unreviewed branch commit."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is reachable from origin/main."

      - name: Verify all versions match tag
        working-directory: .
        run: bash scripts/validate.sh --check-tag "${GITHUB_REF_NAME#v}"

      # Oldest supported runtime (3.9 per plugins/maven-mcp/AGENTS.md). CI
      # already matrices 3.9+3.13; the release gate must also pin 3.9 so a
      # 3.9-only break cannot ship behind a system-python green check (#358).
      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # working-directory: . overrides the job's defaults.run.working-directory
      # (plugins/maven-mcp); without it the -s path would double-resolve to
      # plugins/maven-mcp/plugins/maven-mcp/tests and fail.
      - name: Run Python tests
        working-directory: .
        run: python3 -m unittest discover -s plugins/maven-mcp/tests

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          make_latest: true

      - name: Publish per-plugin tags for plugin dependency resolution
        working-directory: .
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # actions/checkout fetches only the tag that triggered the workflow,
          # so sibling per-plugin tags from previous releases won't be known
          # locally. Fetch all tags so the rev-parse existence check below
          # matches the remote state.
          echo "Fetching remote tags..."
          git fetch --tags origin
          # Claude Code resolves plugin dependencies through tags of the form
          # {plugin-name}--v{version}. Push each tag independently so a failure
          # on one plugin does not abort the rest, and every outcome is logged.
          rc=0
          while IFS= read -r plugin; do
            per_plugin_tag="${plugin}--${TAG}"
            if git rev-parse -q --verify "refs/tags/${per_plugin_tag}" >/dev/null; then
              echo "Tag ${per_plugin_tag} already exists locally — skipping."
              continue
            fi
            echo "Creating ${per_plugin_tag}..."
            if ! git tag -a "${per_plugin_tag}" -m "Release ${plugin} ${VERSION} (unified release ${TAG})"; then
              echo "::error::Failed to create ${per_plugin_tag}" >&2
              rc=1
              continue
            fi
            echo "Pushing ${per_plugin_tag}..."
            if git push origin "${per_plugin_tag}"; then
              echo "Pushed ${per_plugin_tag}."
            else
              echo "::error::Failed to push ${per_plugin_tag}" >&2
              rc=1
            fi
          done < <(jq -r '.plugins[].name' .claude-plugin/marketplace.json)
          exit "$rc"
