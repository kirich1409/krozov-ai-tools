name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all plugins are registered in marketplace.json
        run: |
          MISSING=0
          for dir in plugins/*/; do
            plugin="${dir%/}"
            name=$(basename "$plugin")
            if ! jq -e --arg name "$name" '.plugins[] | select(.name == $name)' .claude-plugin/marketplace.json > /dev/null 2>&1; then
              echo "ERROR: '$name' is in plugins/ but missing from .claude-plugin/marketplace.json"
              MISSING=1
            fi
          done
          exit $MISSING

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/maven-mcp
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: plugins/maven-mcp/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
