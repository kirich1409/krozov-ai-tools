name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace and plugin configs
        run: bash scripts/validate.sh

  # The build job is registered as a required status check (build (20),
  # build (22)) by the repo ruleset. It must therefore always run and report
  # success - but heavy work (npm ci, lint, test, build) is gated by a path
  # diff so PRs that don't touch maven-mcp finish in seconds. On push to
  # main everything runs unconditionally - the gate only fires on PRs.
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect maven-mcp changes
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "Push event - run all steps."
            echo "maven_mcp=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pull request: three-dot diff (merge-base..head) so we see only
          # commits introduced by the PR, not unrelated changes that landed
          # on main between fork-point and head.
          CHANGED=$(git diff --name-only "$BASE_SHA...$HEAD_SHA" -- \
            'plugins/maven-mcp/**' '.github/workflows/ci.yml')
          if [ -n "$CHANGED" ]; then
            echo "maven-mcp changed:"
            echo "$CHANGED"
            echo "maven_mcp=true" >> "$GITHUB_OUTPUT"
          else
            echo "No maven-mcp changes - skipping build steps."
            echo "maven_mcp=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js ${{ matrix.node-version }}
        if: steps.changes.outputs.maven_mcp == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: plugins/maven-mcp/package-lock.json

      - name: Verify package.json version matches plugin.json version
        if: steps.changes.outputs.maven_mcp == 'true'
        working-directory: plugins/maven-mcp
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p 'require("./package.json").version')
          PLUGIN_VERSION=$(jq -r '.version' plugin/.claude-plugin/plugin.json)
          if [ "$PKG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match plugin.json version ($PLUGIN_VERSION)"
            exit 1
          fi
          echo "OK: version $PKG_VERSION"

      - if: steps.changes.outputs.maven_mcp == 'true'
        working-directory: plugins/maven-mcp
        run: npm ci
      - if: steps.changes.outputs.maven_mcp == 'true'
        working-directory: plugins/maven-mcp
        run: npm run lint
      - if: steps.changes.outputs.maven_mcp == 'true'
        working-directory: plugins/maven-mcp
        run: npm test
      - if: steps.changes.outputs.maven_mcp == 'true'
        working-directory: plugins/maven-mcp
        run: npm run build

  # Like build, this job is meant to become a required status check
  # (python-tests (3.9), python-tests (3.13)). It must always run and report -
  # so the JOB runs unconditionally and only the heavy STEPS are gated by the
  # same path diff used by build. A job-level if:/paths skip would leave the
  # required check "expected" forever and block merges.
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect maven-mcp changes
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "Push event - run all steps."
            echo "maven_mcp=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pull request: three-dot diff (merge-base..head) so we see only
          # commits introduced by the PR, not unrelated changes that landed
          # on main between fork-point and head.
          CHANGED=$(git diff --name-only "$BASE_SHA...$HEAD_SHA" -- \
            'plugins/maven-mcp/**' '.github/workflows/ci.yml')
          if [ -n "$CHANGED" ]; then
            echo "maven-mcp changed:"
            echo "$CHANGED"
            echo "maven_mcp=true" >> "$GITHUB_OUTPUT"
          else
            echo "No maven-mcp changes - skipping test steps."
            echo "maven_mcp=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python ${{ matrix.python-version }}
        if: steps.changes.outputs.maven_mcp == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - if: steps.changes.outputs.maven_mcp == 'true'
        run: python3 -m unittest discover -s plugins/maven-mcp/tests -v

      # Zero-dependency static gate (replaces the eslint gate the node build
      # job provides; the node job is removed in PR B).
      - if: steps.changes.outputs.maven_mcp == 'true'
        run: python -m compileall plugins/maven-mcp/plugin/server
