name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for all jobs: they only read the repo (checkout +
# build/test). No job writes contents, comments, or other resources.
permissions:
  contents: read

jobs:
  validate-marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace and plugin configs
        run: bash scripts/validate.sh

  # This job is the required status check (python-tests (3.9),
  # python-tests (3.13)). It must always run and report - so the JOB runs
  # unconditionally and only the heavy STEPS are gated by a path diff so PRs
  # that don't touch maven-mcp finish in seconds. A job-level if:/paths skip
  # would leave the required check "expected" forever and block merges.
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect maven-mcp changes
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "Push event - run all steps."
            echo "maven_mcp=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pull request: three-dot diff (merge-base..head) so we see only
          # commits introduced by the PR, not unrelated changes that landed
          # on main between fork-point and head.
          CHANGED=$(git diff --name-only "$BASE_SHA...$HEAD_SHA" -- \
            'plugins/maven-mcp/**' '.github/workflows/ci.yml')
          if [ -n "$CHANGED" ]; then
            echo "maven-mcp changed:"
            echo "$CHANGED"
            echo "maven_mcp=true" >> "$GITHUB_OUTPUT"
          else
            echo "No maven-mcp changes - skipping test steps."
            echo "maven_mcp=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python ${{ matrix.python-version }}
        if: steps.changes.outputs.maven_mcp == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - if: steps.changes.outputs.maven_mcp == 'true'
        run: python3 -m unittest discover -s plugins/maven-mcp/tests -v

      # Zero-dependency static gate (replaces the eslint gate the now-removed
      # node build job provided).
      - if: steps.changes.outputs.maven_mcp == 'true'
        run: python -m compileall plugins/maven-mcp/plugin/server

      # Shellcheck is preinstalled on ubuntu-latest.
      - if: steps.changes.outputs.maven_mcp == 'true'
        name: Shellcheck hooks
        run: shellcheck plugins/maven-mcp/plugin/hooks/*.sh
