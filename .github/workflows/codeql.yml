name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan to match the previous default-setup schedule.
    - cron: "37 5 * * 1"

# Advanced setup (replaces default setup).
#
# Advanced setup runs for every PR regardless of changed paths, which is the
# reason for switching. Default setup auto-skips PRs that touch no tracked
# language files (JSON/YAML/MD-only changes), so coverage was inconsistent;
# advanced setup always uploads an analysis. CodeQL is NOT a required status
# check in the branch ruleset, so a skipped or empty run never blocks a merge.
#
# Languages: actions, python. (The retired TypeScript reference is gone, so
# javascript-typescript no longer has any code to scan.)
jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
